defaults:
  - ../paths.yaml
  - ../model/ldm_unet_light.yaml

experiment:
  name: ldm_coco_256_vae8_light_vpred

data:
  train_latent_dir: outputs/latents/coco_train2017_vae8_scaled_allcaptions
  val_latent_dir: outputs/latents/coco_val2017_vae8_scaled_allcaptions

  train_caption_mode: random
  val_caption_mode: first

  load_latents_to_memory: false

text_encoder:
  model_name: openai/clip-vit-large-patch14
  max_length: 77
  freeze: true
  use_last_hidden_state: true

  cache_dir: /leonardo_scratch/large/userexternal/aegin000/hf_cache
  local_files_only: true

conditioning:
  cond_drop_prob: 0.1
  empty_text: ""

diffusion:
  schedule_type: cosine
  num_timesteps: 1000
  prediction_type: v
  loss_type: mse

  beta_start: 0.0001
  beta_end: 0.02
  cosine_s: 0.008
  max_beta: 0.999

train:
  seed: 42
  precision: bf16

  batch_size: 32
  gradient_accumulation_steps: 2
  num_workers: 8
  pin_memory: true

  max_epochs: 100

  lr: 0.0001
  weight_decay: 0.01
  betas: [0.9, 0.999]

  grad_clip: 1.0

  log_every: 100
  validate_every: 1
  save_every: 1

  output_dir_key: outputs.ldm_dir

  resume_from: null
  finetune_from: null

optimizer:
  name: adamw