model:
  name: latent_diffusion_unet_medium

  in_channels: 8
  out_channels: 8
  latent_size: 32

  # Stronger width.
  base_channels: 192

  # Channel path:
  # 32x32: 192
  # 16x16: 384
  # 8x8:   768
  #
  # This is much stronger than [128, 256, 384].
  channel_multipliers: [1, 2, 4]

  num_res_blocks: 2
  dropout: 0.0

  # Still avoid 32x32 attention.
  # 32x32 attention is expensive and may not be worth it yet.
  attention_resolutions: [16, 8]

  use_middle_attention: true

  context_dim: 768

  # Stronger attention.
  # inner attention dim = 8 * 64 = 512
  num_heads: 8
  head_dim: 64

  transformer_depth: 1

  time_embedding_dim: null